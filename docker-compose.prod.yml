# Sobreposição para VPS: Caddy na borda (HTTPS automático via ACME).
# O app não publica portas no host no docker-compose.yml base — só o Caddy usa 80/443 aqui.
# Use junto com docker-compose.yml: GETFY_COMPOSE_FILES=docker-compose.yml;docker-compose.prod.yml

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "${GETFY_HTTP_PORT:-80}:80"
      - "443:443"
    env_file:
      - .docker/stack.env
    volumes:
      - ./docker/caddy/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      app:
        condition: service_healthy

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
