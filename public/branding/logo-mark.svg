<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-label="Gateway Lab">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8A2BE2"/>
      <stop offset="50%" style="stop-color:#5D00FF"/>
      <stop offset="100%" style="stop-color:#FF00FF"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="192" height="192" rx="40" fill="#0D0D14"/>
  <circle cx="96" cy="96" r="72" fill="none" stroke="url(#g)" stroke-width="4" filter="url(#glow)" opacity="0.9"/>
  <text x="96" y="118" font-family="Orbitron,system-ui,sans-serif" font-size="72" font-weight="800" fill="url(#g)" text-anchor="middle">G</text>
</svg>
